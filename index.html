<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEO BLOCKS - Tetris風ゲーム</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
      background: radial-gradient(circle at top, #7c3aed 0%, #2e1065 38%, #020617 100%);
      overflow-x: hidden;
    }
    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    h1 {
      margin: 0;
      text-align: center;
      font-size: clamp(40px, 7vw, 76px);
      letter-spacing: -0.06em;
      line-height: 0.95;
      text-shadow: 0 8px 30px rgba(0,0,0,.45);
    }
    .subtitle {
      margin: 10px 0 20px;
      text-align: center;
      color: rgba(237,233,254,.85);
      font-size: 14px;
    }
    .game-layout {
      display: grid;
      grid-template-columns: 220px minmax(320px, 1fr) 260px;
      gap: 18px;
      align-items: start;
    }
    .panel {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 22px;
      padding: 16px;
      box-shadow: 0 24px 60px rgba(0,0,0,.25);
      backdrop-filter: blur(12px);
    }
    .panel + .panel { margin-top: 18px; }
    .panel-title {
      margin-bottom: 10px;
      font-weight: 900;
      font-size: 22px;
      letter-spacing: .03em;
      text-transform: uppercase;
      text-shadow: 0 2px 8px rgba(0,0,0,.45);
    }
    .stat {
      padding: 12px;
      border-radius: 18px;
      background: rgba(0,0,0,.25);
      margin-bottom: 10px;
    }
    .stat-label {
      color: rgba(221,214,254,.75);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .25em;
    }
    .stat-value {
      font-size: 32px;
      line-height: 1.1;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }
    .board-shell {
      position: relative;
      width: fit-content;
      margin: 0 auto;
      padding: 13px;
      border: 4px solid rgba(255,255,255,.25);
      border-radius: 32px;
      background: rgba(2,6,23,.92);
      box-shadow: 0 30px 80px rgba(88,28,135,.72);
    }
    #board {
      display: grid;
      grid-template-columns: repeat(10, 30px);
      gap: 3px;
      padding: 8px;
      border-radius: 20px;
      background: rgba(0,0,0,.36);
    }
    .cell {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      background: rgba(15,23,42,.85);
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: inset 0 2px 5px rgba(255,255,255,.05), inset 0 -3px 8px rgba(0,0,0,.3);
    }
    .I { background: #22d3ee; border-color: #a5f3fc; box-shadow: 0 0 12px rgba(34,211,238,.45), inset 0 2px 5px rgba(255,255,255,.4); }
    .O { background: #facc15; border-color: #fef08a; box-shadow: 0 0 12px rgba(250,204,21,.45), inset 0 2px 5px rgba(255,255,255,.4); }
    .T { background: #a855f7; border-color: #d8b4fe; box-shadow: 0 0 12px rgba(168,85,247,.45), inset 0 2px 5px rgba(255,255,255,.4); }
    .S { background: #22c55e; border-color: #86efac; box-shadow: 0 0 12px rgba(34,197,94,.45), inset 0 2px 5px rgba(255,255,255,.4); }
    .Z { background: #ef4444; border-color: #fecaca; box-shadow: 0 0 12px rgba(239,68,68,.45), inset 0 2px 5px rgba(255,255,255,.4); }
    .J { background: #3b82f6; border-color: #bfdbfe; box-shadow: 0 0 12px rgba(59,130,246,.45), inset 0 2px 5px rgba(255,255,255,.4); }
    .L { background: #f97316; border-color: #fed7aa; box-shadow: 0 0 12px rgba(249,115,22,.45), inset 0 2px 5px rgba(255,255,255,.4); }
    .GHOST { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.25); box-shadow: none; }
    .mini {
      display: grid;
      grid-template-columns: repeat(4, 24px);
      gap: 4px;
      width: fit-content;
      padding: 12px;
      border-radius: 16px;
      background: rgba(0,0,0,.25);
      margin-bottom: 10px;
    }
    .mini .cell {
      width: 24px;
      height: 24px;
      border-radius: 6px;
    }
    .help {
      padding: 12px;
      border-radius: 18px;
      background: rgba(0,0,0,.25);
      color: rgba(237,233,254,.88);
      font-size: 14px;
      line-height: 1.75;
    }
    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    button {
      border: 0;
      border-radius: 16px;
      padding: 12px 10px;
      font-weight: 900;
      color: #1e1b4b;
      background: rgba(255,255,255,.88);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
    }
    button:hover { transform: translateY(-1px); background: white; }
    .overlay {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: 28px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 24px;
      z-index: 5;
    }
    .overlay.show { display: flex; }
    .overlay-title {
      font-size: 42px;
      font-weight: 950;
      letter-spacing: -0.04em;
    }
    .overlay-text {
      margin: 8px 0 18px;
      color: rgba(237,233,254,.86);
    }
    @media (max-width: 900px) {
      .game-layout { grid-template-columns: 1fr; }
      .side-left, .side-right { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      .panel + .panel { margin-top: 0; }
      #board { grid-template-columns: repeat(10, 27px); }
      .cell { width: 27px; height: 27px; }
    }
    @media (max-width: 520px) {
      .side-left, .side-right { grid-template-columns: 1fr; }
      #board { grid-template-columns: repeat(10, 24px); gap: 2px; }
      .cell { width: 24px; height: 24px; border-radius: 5px; }
      .board-shell { padding: 9px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>NEO BLOCKS</h1>
    <p class="subtitle">Tetris風の落ちものパズル。HTMLファイル1個で起動できます。</p>

    <div class="game-layout">
      <div class="side-left">
        <div class="panel">
          <div class="panel-title">HOLD</div>
          <div id="hold" class="mini"></div>
          <div class="help">Cキーで1ターン1回だけ交換</div>
        </div>
        <div class="panel">
          <div class="stat"><div class="stat-label">LEVEL</div><div id="level" class="stat-value">1</div></div>
          <div class="stat"><div class="stat-label">LINES</div><div id="lines" class="stat-value">0</div></div>
          <div class="stat"><div class="stat-label">SCORE</div><div id="score" class="stat-value">0</div></div>
        </div>
      </div>

      <div class="board-shell">
        <div id="board"></div>
        <div id="pauseOverlay" class="overlay"><div class="overlay-title">PAUSED</div><div class="overlay-text">Pキーで再開</div></div>
        <div id="gameOverOverlay" class="overlay"><div class="overlay-title">GAME OVER</div><div id="finalScore" class="overlay-text">SCORE 0</div><button onclick="resetGame()">もう一度</button></div>
      </div>

      <div class="side-right">
        <div class="panel">
          <div class="panel-title">NEXT</div>
          <div id="next"></div>
        </div>
        <div class="panel">
          <div class="buttons">
            <button onclick="togglePause()">P 一時停止</button>
            <button onclick="resetGame()">R リセット</button>
            <button onclick="rotatePiece(-1)">Z 左回転</button>
            <button onclick="rotatePiece(1)">X 右回転</button>
          </div>
          <div class="help">
            ← →：左右移動<br>
            ↓：ソフトドロップ<br>
            Space：ハードドロップ<br>
            C：ホールド<br>
            P：一時停止 / R：リセット
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const COLS = 10;
    const ROWS = 20;
    const TYPES = ["I", "O", "T", "S", "Z", "J", "L"];
    const SHAPES = {
      I: [[1,1,1,1]],
      O: [[1,1],[1,1]],
      T: [[0,1,0],[1,1,1]],
      S: [[0,1,1],[1,1,0]],
      Z: [[1,1,0],[0,1,1]],
      J: [[1,0,0],[1,1,1]],
      L: [[0,0,1],[1,1,1]],
    };

    let board, piece, nextPieces, holdPieceData, canHold, score, lines, level, running, gameOver, timer;

    function emptyBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    }

    function cloneShape(shape) {
      return shape.map(row => row.slice());
    }

    function pickPiece() {
      const type = TYPES[Math.floor(Math.random() * TYPES.length)];
      const shape = cloneShape(SHAPES[type]);
      return { type, shape, x: Math.floor(COLS / 2) - Math.ceil(shape[0].length / 2), y: 0 };
    }

    function rotate(shape, dir) {
      const rows = shape.length;
      const cols = shape[0].length;
      const out = Array.from({ length: cols }, () => Array(rows).fill(0));
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          if (dir > 0) out[x][rows - 1 - y] = shape[y][x];
          else out[cols - 1 - x][y] = shape[y][x];
        }
      }
      return out;
    }

    function collides(testPiece, offsetX = 0, offsetY = 0, shapeOverride = null) {
      const shape = shapeOverride || testPiece.shape;
      for (let y = 0; y < shape.length; y++) {
        for (let x = 0; x < shape[y].length; x++) {
          if (!shape[y][x]) continue;
          const nx = testPiece.x + x + offsetX;
          const ny = testPiece.y + y + offsetY;
          if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
          if (ny >= 0 && board[ny][nx]) return true;
        }
      }
      return false;
    }

    function mergePiece() {
      piece.shape.forEach((row, y) => {
        row.forEach((cell, x) => {
          if (cell) {
            const by = piece.y + y;
            const bx = piece.x + x;
            if (by >= 0 && by < ROWS && bx >= 0 && bx < COLS) board[by][bx] = piece.type;
          }
        });
      });
    }

    function clearLines() {
      let cleared = 0;
      board = board.filter(row => {
        const full = row.every(Boolean);
        if (full) cleared++;
        return !full;
      });
      while (board.length < ROWS) board.unshift(Array(COLS).fill(null));
      if (cleared > 0) {
        const scores = [0, 100, 300, 500, 800];
        score += scores[cleared] * level;
        lines += cleared;
        level = Math.floor(lines / 10) + 1;
      }
    }

    function spawnNext() {
      piece = nextPieces.shift();
      piece.x = Math.floor(COLS / 2) - Math.ceil(piece.shape[0].length / 2);
      piece.y = 0;
      nextPieces.push(pickPiece());
      canHold = true;
      if (collides(piece)) {
        gameOver = true;
        running = false;
      }
    }

    function lockPiece() {
      mergePiece();
      clearLines();
      spawnNext();
      draw();
    }

    function move(dx, dy) {
      if (!running || gameOver) return;
      if (!collides(piece, dx, dy)) {
        piece.x += dx;
        piece.y += dy;
        if (dy === 1) score += 1;
      } else if (dy === 1 && dx === 0) {
        lockPiece();
        return;
      }
      draw();
    }

    function rotatePiece(dir) {
      if (!running || gameOver) return;
      const rotated = rotate(piece.shape, dir);
      const kicks = [0, -1, 1, -2, 2];
      for (const kick of kicks) {
        if (!collides(piece, kick, 0, rotated)) {
          piece.x += kick;
          piece.shape = rotated;
          draw();
          return;
        }
      }
    }

    function getGhost() {
      const ghost = { type: piece.type, shape: cloneShape(piece.shape), x: piece.x, y: piece.y };
      while (!collides(ghost, 0, 1)) ghost.y++;
      return ghost;
    }

    function hardDrop() {
      if (!running || gameOver) return;
      const oldY = piece.y;
      piece = getGhost();
      score += Math.max(0, piece.y - oldY) * 2;
      lockPiece();
    }

    function holdCurrentPiece() {
      if (!running || gameOver || !canHold) return;
      canHold = false;
      if (holdPieceData) {
        const temp = holdPieceData;
        holdPieceData = { type: piece.type, shape: cloneShape(SHAPES[piece.type]), x: 0, y: 0 };
        piece = { type: temp.type, shape: cloneShape(SHAPES[temp.type]), x: Math.floor(COLS / 2) - Math.ceil(SHAPES[temp.type][0].length / 2), y: 0 };
      } else {
        holdPieceData = { type: piece.type, shape: cloneShape(SHAPES[piece.type]), x: 0, y: 0 };
        spawnNext();
      }
      draw();
    }

    function drawMini(container, miniPiece) {
      container.innerHTML = "";
      const shape = miniPiece ? miniPiece.shape : [];
      for (let y = 0; y < 4; y++) {
        for (let x = 0; x < 4; x++) {
          const div = document.createElement("div");
          div.className = "cell";
          if (shape[y] && shape[y][x]) div.classList.add(miniPiece.type);
          container.appendChild(div);
        }
      }
    }

    function draw() {
      const boardEl = document.getElementById("board");
      boardEl.innerHTML = "";
      const display = board.map(row => row.slice());
      const ghost = getGhost();

      ghost.shape.forEach((row, y) => row.forEach((cell, x) => {
        if (cell) {
          const by = ghost.y + y;
          const bx = ghost.x + x;
          if (by >= 0 && by < ROWS && bx >= 0 && bx < COLS && !display[by][bx]) display[by][bx] = "GHOST";
        }
      }));

      piece.shape.forEach((row, y) => row.forEach((cell, x) => {
        if (cell) {
          const by = piece.y + y;
          const bx = piece.x + x;
          if (by >= 0 && by < ROWS && bx >= 0 && bx < COLS) display[by][bx] = piece.type;
        }
      }));

      display.forEach(row => row.forEach(cell => {
        const div = document.createElement("div");
        div.className = "cell";
        if (cell) div.classList.add(cell);
        boardEl.appendChild(div);
      }));

      document.getElementById("score").textContent = score.toLocaleString();
      document.getElementById("lines").textContent = lines;
      document.getElementById("level").textContent = level;
      drawMini(document.getElementById("hold"), holdPieceData);

      const nextEl = document.getElementById("next");
      nextEl.innerHTML = "";
      nextPieces.forEach(p => {
        const mini = document.createElement("div");
        mini.className = "mini";
        nextEl.appendChild(mini);
        drawMini(mini, p);
      });

      document.getElementById("pauseOverlay").classList.toggle("show", !running && !gameOver);
      document.getElementById("gameOverOverlay").classList.toggle("show", gameOver);
      document.getElementById("finalScore").textContent = "SCORE " + score.toLocaleString();
    }

    function gameTick() {
      if (running && !gameOver) move(0, 1);
      restartTimer();
    }

    function restartTimer() {
      clearTimeout(timer);
      const speed = Math.max(90, 760 - (level - 1) * 55);
      timer = setTimeout(gameTick, speed);
    }

    function togglePause() {
      if (gameOver) return;
      running = !running;
      draw();
    }

    function resetGame() {
      board = emptyBoard();
      piece = pickPiece();
      nextPieces = [pickPiece(), pickPiece(), pickPiece()];
      holdPieceData = null;
      canHold = true;
      score = 0;
      lines = 0;
      level = 1;
      running = true;
      gameOver = false;
      draw();
      restartTimer();
    }

    document.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (["arrowleft", "arrowright", "arrowdown", "arrowup", " ", "z", "x", "c", "p", "r"].includes(key)) e.preventDefault();
      if (key === "arrowleft") move(-1, 0);
      if (key === "arrowright") move(1, 0);
      if (key === "arrowdown") move(0, 1);
      if (key === "arrowup" || key === "x") rotatePiece(1);
      if (key === "z") rotatePiece(-1);
      if (key === " ") hardDrop();
      if (key === "c") holdCurrentPiece();
      if (key === "p") togglePause();
      if (key === "r") resetGame();
    });

    resetGame();
  </script>
</body>
</html>
